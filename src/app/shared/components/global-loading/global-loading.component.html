@if (loading.isLoading()) {
<div class="loading-top-line" aria-hidden="true"></div>
<div class="loading-float" role="status" aria-live="polite" aria-label="Cargando">
  <div class="spinner-orbit">
    <div class="spinner-dot dot-a"></div>
    <div class="spinner-dot dot-b"></div>
    <div class="spinner-dot dot-c"></div>
  </div>
  <span>Cargando...</span>
</div>
}
