<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden border border-slate-200">
    <div class="bg-[#1E3A8A] text-white px-6 py-4 flex justify-between items-center">
      <h2 class="text-lg font-bold tracking-wide">{{ userToEdit ? 'Editar Usuario' : 'Registrar Nuevo Usuario' }}</h2>
      <button (click)="onCancel()" class="text-white/80 hover:text-white font-semibold text-xl">&times;</button>
    </div>

    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Nombre</label>
          <input type="text" formControlName="nombre" placeholder="Ej: Luciano"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="userForm.get('nombre')?.touched && userForm.get('nombre')?.invalid"
            class="text-rose-600 text-xs">El nombre es obligatorio.</small>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Apellido</label>
          <input type="text" formControlName="apellido" placeholder="Ej: Favatier"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="userForm.get('apellido')?.touched && userForm.get('apellido')?.invalid"
            class="text-rose-600 text-xs">El apellido es obligatorio.</small>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Email</label>
          <input type="email" formControlName="email" placeholder="correo@dominio.com"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="userForm.get('email')?.touched && userForm.get('email')?.invalid"
            class="text-rose-600 text-xs">Ingresa un email válido.</small>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Contraseña</label>
          <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="userForm.get('password')?.touched && userForm.get('password')?.invalid"
            class="text-rose-600 text-xs">La contraseña debe tener al menos 6 caracteres.</small>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Estado</label>
          <select formControlName="activo"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
            <option [ngValue]="true">Activo</option>
            <option [ngValue]="false">Inactivo</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Rol</label>
          <select formControlName="idRol"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
            <option [ngValue]="1">Administrador</option>
            <option [ngValue]="2">Usuario</option>
          </select>
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
        <button type="button" (click)="onCancel()" [disabled]="isSubmitting"
          class="px-4 py-2 border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
          Cancelar
        </button>
        <button type="submit" [disabled]="isSubmitting"
          class="px-4 py-2 bg-[#1E3A8A] hover:bg-[#162a65] text-white rounded-lg text-sm font-medium transition-colors shadow-sm disabled:opacity-50">
          {{ isSubmitting ? 'Guardando...' : userToEdit ? 'Actualizar Usuario' : 'Crear Usuario' }}
        </button>
      </div>
    </form>
  </div>
</div>
