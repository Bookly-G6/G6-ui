<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden border border-slate-200">
    <div class="bg-[#1E3A8A] text-white px-6 py-4 flex justify-between items-center">
      <h2 class="text-lg font-bold tracking-wide">
        {{ logisticaToEdit ? 'Editar envío' : 'Nueva orden logística' }}
      </h2>
      <button type="button" (click)="onCancel()" class="text-white/80 hover:text-white font-semibold text-xl">
        &times;
      </button>
    </div>

    <form [formGroup]="logisticaForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">ID Venta</label>
          <input type="text" formControlName="idVenta" placeholder="UUID de la venta"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="logisticaForm.get('idVenta')?.touched && logisticaForm.get('idVenta')?.invalid"
            class="text-rose-600 text-xs">El ID de venta es obligatorio.</small>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Tipo de envío</label>
          <select formControlName="tipoEnvio"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
            <option value="DOMICILIO">Domicilio</option>
            <option value="RETIRO_SUCURSAL">Retiro en sucursal</option>
            <option value="DIGITAL">Digital</option>
          </select>
        </div>
      </div>

      <div *ngIf="logisticaForm.get('tipoEnvio')?.value === 'DOMICILIO'" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Empresa de
            correo</label>
          <input type="text" formControlName="empresaCorreo" placeholder="OCA, Correo Argentino..."
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="logisticaForm.get('empresaCorreo')?.touched && logisticaForm.get('empresaCorreo')?.invalid"
            class="text-rose-600 text-xs">La empresa de correo es obligatoria.</small>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Número de
            tracking</label>
          <input type="text" formControlName="numeroTracking" placeholder="OCA-999888777"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="logisticaForm.get('numeroTracking')?.touched && logisticaForm.get('numeroTracking')?.invalid"
            class="text-rose-600 text-xs">El número de tracking es obligatorio.</small>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Observaciones</label>
        <textarea formControlName="observaciones" rows="3" placeholder="Detalles adicionales del envío"
          class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A] resize-none"></textarea>
      </div>

      <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
        <button type="button" (click)="onCancel()" [disabled]="isSubmitting"
          class="px-4 py-2 border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
          Cancelar
        </button>
        <button type="submit" [disabled]="isSubmitting"
          class="px-4 py-2 bg-[#1E3A8A] hover:bg-[#162a65] text-white rounded-lg text-sm font-medium transition-colors shadow-sm disabled:opacity-50">
          {{ isSubmitting ? 'Guardando...' : 'Guardar orden' }}
        </button>
      </div>
    </form>
  </div>
</div>
