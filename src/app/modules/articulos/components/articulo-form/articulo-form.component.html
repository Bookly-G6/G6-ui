<div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
  <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl overflow-hidden border border-slate-200">
    <div class="bg-[#1E3A8A] text-white px-6 py-4 flex justify-between items-center">
      <h2 class="text-lg font-bold tracking-wide">{{ articuloToEdit ? 'Editar Artículo' : 'Registrar Nuevo Artículo' }}
      </h2>
      <button (click)="onCancel()" class="text-white/80 hover:text-white font-semibold text-xl">&times;</button>
    </div>

    <form [formGroup]="articuloForm" (ngSubmit)="onSubmit()" class="p-6 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Nombre</label>
          <input type="text" formControlName="nombreArticulo" placeholder="Ej: Mouse Logitech G203"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="articuloForm.get('nombreArticulo')?.touched && articuloForm.get('nombreArticulo')?.invalid"
            class="text-rose-600 text-xs">El nombre es obligatorio.</small>
        </div>

        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Código de
            barras</label>
          <input type="text" formControlName="codigoBarras" placeholder="Ej: 7791234567890"
            class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]">
          <small *ngIf="articuloForm.get('codigoBarras')?.touched && articuloForm.get('codigoBarras')?.invalid"
            class="text-rose-600 text-xs">El código de barras es obligatorio.</small>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1">Descripción</label>
        <textarea formControlName="descripcion" rows="3" placeholder="Descripción del artículo"
          class="w-full border border-slate-200 px-3 py-2 rounded-lg text-sm focus:outline-none focus:border-[#1E3A8A]"></textarea>
        <small *ngIf="articuloForm.get('descripcion')?.touched && articuloForm.get('descripcion')?.invalid"
          class="text-rose-600 text-xs">La descripción es obligatoria.</small>
      </div>

      <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
        <button type="button" (click)="onCancel()" [disabled]="isSubmitting"
          class="px-4 py-2 border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors">
          Cancelar
        </button>
        <button type="submit" [disabled]="isSubmitting"
          class="px-4 py-2 bg-[#1E3A8A] hover:bg-[#162a65] text-white rounded-lg text-sm font-medium transition-colors shadow-sm disabled:opacity-50">
          {{ isSubmitting ? 'Guardando...' : articuloToEdit ? 'Actualizar Artículo' : 'Crear Artículo' }}
        </button>
      </div>
    </form>
  </div>
</div>
