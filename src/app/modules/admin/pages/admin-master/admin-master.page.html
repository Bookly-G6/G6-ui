<section class="admin-master">
  <header>
    <h1>Master Data Management</h1>
    <p>Administra productos, categorías y usuarios del sistema.</p>
  </header>

  <div class="tab-row bookly-panel">
    <button class="bookly-btn tab-btn" [class.active]="currentTab() === 'productos'" (click)="setTab('productos')">
      Productos
    </button>
    <button class="bookly-btn tab-btn" [class.active]="currentTab() === 'categorias'" (click)="setTab('categorias')">
      Categorías
    </button>
    <button class="bookly-btn tab-btn" [class.active]="currentTab() === 'usuarios'" (click)="setTab('usuarios')">
      Usuarios
    </button>
  </div>

  <div class="admin-content">
    @if (currentTab() === 'productos') {
    <div @sectionSwap>
      <app-product-list></app-product-list>
    </div>
    }

    @if (currentTab() === 'categorias') {
    <div @sectionSwap>
      <app-catalog-settings-panel></app-catalog-settings-panel>
    </div>
    }

    @if (currentTab() === 'usuarios') {
    <div @sectionSwap>
      <app-user-list></app-user-list>
    </div>
    }
  </div>
</section>
