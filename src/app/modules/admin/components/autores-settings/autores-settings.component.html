<section class="settings-grid section-enter">
  <article class="bookly-panel setting-col">
    <h3>Cargar un nuevo autor</h3>

    <div class="add-grid mt-2">
      <input class="bookly-input" [(ngModel)]="nuevoAutor" placeholder="Nombre del autor" />
      <textarea class="bookly-input" [(ngModel)]="nuevaBiografia" rows="2"
        placeholder="Biografía (opcional)"></textarea>
      <button class="bookly-btn bookly-btn-secondary" (click)="addAutor()">Crear autor</button>
    </div>

    <ul>
      @for (autor of autores(); track autor.idAutorArtista) {
      <li>
        <div>
          <strong>{{ autor.nombre }}</strong>
          @if (autor.biografia) {
          <p>{{ autor.biografia }}</p>
          }
        </div>
        <button type="button" (click)="deleteAutor(autor.idAutorArtista)">🗑</button>
      </li>
      }
    </ul>

  </article>
</section>
